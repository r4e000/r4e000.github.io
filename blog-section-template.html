<!DOCTYPE HTML>
<!--
	새 분야 블로그를 만들 때 이 파일을 복사해서 사용합니다.
	1. 파일명을 새 페이지 이름으로 바꿉니다. 예: tab_5.html
	2. body의 data-blog-section 값을 새 분야 slug로 바꿉니다. 예: diablo4
	3. 제목과 설명 문구를 해당 분야에 맞게 수정합니다.
	4. data/blog-sections.json에 같은 slug의 항목을 추가합니다.
	5. Pages CMS에서 글 작성 시 category 값을 같은 slug로 지정합니다.
-->
<html>
	<head>
		<title>HAX | 새 분야 템플릿</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload" data-blog-view="section" data-blog-section="new-category">
		<div id="wrapper">
			<header id="header">
				<div class="inner">
					<a href="index.html" class="logo">
						<span class="symbol"><img src="images/logo.svg" alt="" /></span><span class="title">HAX</span>
					</a>
					<nav>
						<ul>
							<li><a href="#menu">메뉴</a></li>
						</ul>
					</nav>
				</div>
			</header>

			<nav id="menu">
				<h2>메뉴</h2>
				<ul>
					<li><a href="index.html">HOME</a></li>
					<li><a href="tab_4.html">ARCHIVE</a></li>
				</ul>
			</nav>

			<div id="main">
				<div class="inner blog-shell">
					<header class="blog-page-header">
						<p id="blog-section-kicker" class="blog-kicker font-lv1-bold">FIELD / NEW CATEGORY</p>
						<h1><span id="blog-section-title" class="font-lv1-bold">새 분야 블로그</span></h1>
						<p><span id="blog-section-description" class="font-lv1">새로운 분야의 글을 모아두는 카테고리 페이지 템플릿입니다.</span></p>
					</header>

					<section id="blog-section-summary" class="blog-featured box" hidden></section>

					<section class="blog-status-bar">
						<p id="blog-count" class="blog-status font-lv1">게시글을 불러오는 중입니다...</p>
					</section>

					<section id="blog-featured" class="blog-featured box" hidden></section>
					<section id="blog-list" class="blog-list-grid"></section>

					<section id="blog-empty" class="box blog-empty" hidden>
						<h2><span class="font-lv1-bold">아직 게시글이 없습니다</span></h2>
						<p><span class="font-lv1">Pages CMS에서 같은 slug를 분야 값으로 사용해 글을 작성하면 자동으로 표시됩니다.</span></p>
					</section>
				</div>
			</div>

			<footer id="footer">
				<div class="inner">
					<section>
						<h2>연락처</h2>
						<ul class="icons">
							<li><a href="https://github.com/r4e000" class="icon brands style2 fa-github"><span class="label">GitHub</span></a></li>
							<li><a href="mailto:hax@kakao.com" class="icon solid style2 fa-envelope"><span class="label">이메일</span></a></li>
						</ul>
					</section>
					<ul class="copyright">
						<li>&copy; HAX. All rights reserved</li><li>디자인 템플릿 제공: <a href="http://html5up.net">HTML5 UP</a></li>
					</ul>
				</div>
			</footer>
		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/blog.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>
