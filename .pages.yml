media:
  - name: blog_images
    input: images/blog
    output: /images/blog
    categories: [image]
    extensions: [png, jpg, jpeg, webp, gif]
    rename: true

content:
  - name: posts
    label: Articles
    type: file
    path: data/posts.json
    format: json
    list: true
    fields:
      - name: title
        label: "\uC81C\uBAA9"
        type: string

      - name: category
        label: "\uBD84\uC57C"
        type: select
        options:
          creatable: true
          values:
            - value: aion2
              label: AION2
            - value: steam
              label: Steam

      - name: date
        label: "\uC791\uC131\uC77C"
        type: date

      - name: postNo
        label: "\uB0A0\uC9DC\uBCC4 \uBC88\uD638"
        type: number
        options:
          min: 1
          step: 1

      - name: excerpt
        label: "\uC694\uC57D"
        type: text

      - name: cover
        label: "\uCEE4\uBC84 \uC774\uBBF8\uC9C0"
        type: image
        options:
          media: blog_images
          path: cover

      - name: coverAlt
        label: "\uC774\uBBF8\uC9C0 \uC124\uBA85"
        type: string

      - name: sections
        label: Block
        type: block
        list: true
        blockKey: type
        blocks:
          - name: text
            label: Text Block
            fields:
              - name: content
                label: "\uB0B4\uC6A9"
                type: rich-text
                options:
                  format: html
                  media: false
                  switcher: true
          - name: image
            label: Image Block
            fields:
              - name: image
                label: "\uC774\uBBF8\uC9C0"
                type: image
                options:
                  media: blog_images
                  path: inline
              - name: alt
                label: "\uB300\uCCB4 \uD14D\uC2A4\uD2B8"
                type: string
              - name: caption
                label: "\uC124\uBA85"
                type: string
          - name: powerlink
            label: Power Link Block
            fields:
              - name: image
                label: "\uC774\uBBF8\uC9C0"
                type: image
                options:
                  media: blog_images
                  path: inline
              - name: alt
                label: "\uB300\uCCB4 \uD14D\uC2A4\uD2B8"
                type: string
              - name: caption
                label: "\uC124\uBA85"
                type: string
              - name: href
                label: "\uB9C1\uD06C \uC8FC\uC18C"
                type: string
              - name: newTab
                label: "\uC0C8 \uD0ED\uC5D0\uC11C \uC5F4\uAE30"
                type: boolean
                default: true
