media:
  - name: blog_images
    input: images/blog
    output: /images/blog
    categories: [image]
    extensions: [png, jpg, jpeg, webp, gif]
    rename: true

content:
  - name: posts
    label: "\uAC8C\uC2DC\uAE00"
    type: file
    path: data/posts.json
    format: json
    list: true
    fields:
      - name: slug
        label: "\uACE0\uC720\uC8FC\uC18C"
        type: string

      - name: title
        label: "\uC81C\uBAA9"
        type: string

      - name: category
        label: "\uBD84\uC57C"
        type: select
        options:
          creatable: true
          values:
            - value: aion2
              label: AION2
            - value: steam
              label: Steam

      - name: date
        label: "\uC791\uC131\uC77C"
        type: date

      - name: excerpt
        label: "\uC694\uC57D"
        type: text

      - name: cover
        label: "\uCEE4\uBC84 \uC774\uBBF8\uC9C0"
        type: image
        options:
          media: blog_images
          path: cover

      - name: coverAlt
        label: "\uC774\uBBF8\uC9C0 \uC124\uBA85"
        type: string

      - name: sections
        label: "\uBCF8\uBB38"
        type: block
        list: true
        blockKey: type
        blocks:
          - name: text
            label: "\uD14D\uC2A4\uD2B8"
            fields:
              - name: content
                label: "\uB0B4\uC6A9"
                type: rich-text
                options:
                  format: html
                  media: false
                  switcher: true
          - name: image
            label: "\uC774\uBBF8\uC9C0"
            fields:
              - name: image
                label: "\uC774\uBBF8\uC9C0"
                type: image
                options:
                  media: blog_images
                  path: inline
              - name: alt
                label: "\uB300\uCCB4 \uD14D\uC2A4\uD2B8"
                type: string
              - name: caption
                label: "\uC124\uBA85"
                type: string
