media:
  input: images/blog
  output: /images/blog
  categories: [image]
  extensions: [png, jpg, jpeg, webp, gif]
  rename: true

content:
  - name: posts
    label: "\uAC8C\uC2DC\uAE00"
    type: file
    path: data/posts.json
    format: json
    list: true
    fields:
      - name: slug
        label: "\uACE0\uC720\uC8FC\uC18C"
        type: string

      - name: title
        label: "\uC81C\uBAA9"
        type: string

      - name: category
        label: "\uBD84\uC57C"
        type: select
        options:
          creatable: true
          values:
            - value: aion2
              label: AION2
            - value: steam
              label: Steam

      - name: date
        label: "\uC791\uC131\uC77C"
        type: date

      - name: excerpt
        label: "\uC694\uC57D"
        type: text

      - name: cover
        label: "\uCEE4\uBC84 \uC774\uBBF8\uC9C0"
        type: image

      - name: coverAlt
        label: "\uC774\uBBF8\uC9C0 \uC124\uBA85"
        type: string

      - name: body
        label: "\uBCF8\uBB38"
        type: rich-text
        options:
          format: html
          switcher: true
          categories: [image]
          extensions: [png, jpg, jpeg, webp, gif]
          rename: true
